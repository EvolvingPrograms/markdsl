name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel a previous run if a new commit lands while the prior is in flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        # The integration tests (recipedown, postcard) shell out to the
        # system pandoc binary. ubuntu-latest ships pandoc 3.x.
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Pandoc version (sanity)
        run: pandoc --version | head -1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  publish:
    # Only publish on direct pushes to the main branch — never from
    # PRs. Requires npm trusted-publisher access on the workflow.
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # OIDC for npm trusted publishing
      contents: write     # push the post-publish version bump
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + write token so the version-bump commit
          # can be pushed back. `persist-credentials` keeps the token
          # for the later `git push`.
          fetch-depth: 0
          persist-credentials: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check if current version is already published
        id: check
        run: |
          PKG_NAME=$(jq -r .name package.json)
          PKG_VERSION=$(jq -r .version package.json)
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          # `npm view <pkg>@<version> version` prints the version on
          # success and exits non-zero (or empty) if the version
          # doesn't exist. We tolerate either failure mode.
          if PUBLISHED=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null) && [ -n "$PUBLISHED" ]; then
            echo "Version ${PKG_VERSION} is already published — skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${PKG_VERSION} is new — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (trusted publisher)
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public

      - name: Bump patch version for next release
        if: steps.check.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # `npm version patch` updates package.json + creates a tag.
          # We tag the just-published version so the bump commit lands
          # on the NEXT version. `--no-git-tag-version` skips tagging
          # for the bump itself; the tag we want is already implicit
          # via the publish.
          npm version patch --no-git-tag-version
          NEW=$(jq -r .version package.json)
          git add package.json bun.lock
          git commit -m "chore: bump version to ${NEW} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
